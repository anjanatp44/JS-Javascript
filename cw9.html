<!DOCTYPE html>
<html>
<head>
  <title>User Comment System</title>
</head>
<body>
  <script>
    // Test comment
    let comment = "My son is 12 years old. Our flat number is 45 and contact is 9876543210.";

    // Regular expression to check digits
    let hasNumber = /\d/.test(comment); // returns true if any digit found

    // Replace all digits with the word "NUMBER"
    let updatedComment = comment.replace(/\d+/g, "NUMBER");

    // Output the results
    document.write("Number found: " + hasNumber + "<br>");
    document.write("Updated comment: " + updatedComment);
  </script>
</body>
</html>
